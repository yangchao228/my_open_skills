      - confirm the two remaining Zhihu long-form R2 uploads and Markdown URL rewrites
      - complete final editor layout and link checks before platform publishing
  next_step:
    skill: wenchang-publish-check
    reason: rerun final after human confirmation of all card sets and the remaining Zhihu R2 decision
    user_decision_needed: true
  handoff:
    from_stage: cards-to-images
    to_stage: multi-platform-image-confirmation
    accepted_inputs:
      - image-manifest-v2.md
      - xiaohongshu-upload-manifest.md
      - wechat-inline-manifest.md
      - zhihu-idea-manifest.md
      - wechat-draft.md.image-publish-plan.json
      - zhihu-draft.md.image-publish-plan.json
    ignored_context:
      - account sessions
      - private R2 credentials
    stop_condition: stop before the remaining Zhihu R2 upload, platform image upload, article insertion, or platform publishing
